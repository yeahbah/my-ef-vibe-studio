name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          chmod +x .github/scripts/install-linux-deps.sh
          .github/scripts/install-linux-deps.sh

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Test Tauri backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Test frontend
        run: npm test

  release:
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip version bump commits
        id: skip
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if commit already tagged
        id: tagged
        if: steps.skip.outputs.skip != 'true'
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit already has tag: $(git describe --tags --exact-match HEAD)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.skip.outputs.skip != 'true' && steps.tagged.outputs.skip != 'true'
        run: |
          chmod +x .github/scripts/next-version.sh
          VERSION="$(.github/scripts/next-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next release version: $VERSION"

      - name: Create and push tag
        if: steps.skip.outputs.skip != 'true' && steps.tagged.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Sync version in repo
        if: steps.skip.outputs.skip != 'true' && steps.tagged.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x .github/scripts/sync-version.sh
          .github/scripts/sync-version.sh "$VERSION"
          if git diff --quiet; then
            echo "No file changes to commit."
            exit 0
          fi
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

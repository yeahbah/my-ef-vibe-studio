name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (e.g. 0.2.0). Defaults to package.json.'
        required: false
        type: string
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      draft: ${{ steps.version.outputs.draft }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRAFT: ${{ inputs.draft }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(jq -r '.version' package.json)"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRAFT="$INPUT_DRAFT"
          else
            DRAFT="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "Publishing efvibe Studio ${VERSION} (draft=${DRAFT})"

  build-tauri:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos
            args: '--target aarch64-apple-darwin'
            rust_targets: aarch64-apple-darwin
          - platform: ubuntu-22.04
            artifact: linux
            args: ''
            rust_targets: ''
          - platform: windows-latest
            artifact: windows
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync app version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          chmod +x .github/scripts/sync-version.sh
          .github/scripts/sync-version.sh "$VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          chmod +x .github/scripts/install-linux-deps.sh
          .github/scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          NO_STRIP: 'true'
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/release/bundle -type f -exec cp {} release-artifacts/ \;
          ls -la release-artifacts
          test "$(find release-artifacts -type f | wc -l | tr -d ' ')" -gt 0

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: studio-${{ matrix.artifact }}-${{ needs.resolve-version.outputs.version }}
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    needs:
      - resolve-version
      - build-tauri
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: studio-*-${{ needs.resolve-version.outputs.version }}
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f -maxdepth 2 -print

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: efvibe Studio ${{ needs.resolve-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: ${{ needs.resolve-version.outputs.draft == 'true' }}
          prerelease: false
          files: artifacts/*
          body: |
            Desktop release for **efvibe Studio** ${{ needs.resolve-version.outputs.version }}.

            ### Downloads
            | Platform | Artifacts |
            |----------|-----------|
            | **Linux** | `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.AppImage` (portable) |
            | **macOS** | `.dmg` (Apple Silicon) |
            | **Windows** | `.msi` (recommended) and `.exe` (NSIS) |

            ### Prerequisites
            Studio still requires the [efvibe](https://www.nuget.org/packages/efvibe) CLI and .NET SDK on the machine. See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md).

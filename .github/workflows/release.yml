name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (e.g. 0.2.0). Defaults to package.json.'
        required: false
        type: string
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      draft: ${{ steps.version.outputs.draft }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRAFT: ${{ inputs.draft }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(jq -r '.version' package.json)"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRAFT="$INPUT_DRAFT"
          else
            DRAFT="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "Publishing MyEFvibe Studio ${VERSION} (draft=${DRAFT})"

  build-tauri:
    needs: resolve-version
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos
            args: '--target aarch64-apple-darwin'
            rust_targets: aarch64-apple-darwin
          - platform: ubuntu-22.04
            artifact: linux
            args: ''
            rust_targets: ''
          - platform: windows-latest
            artifact: windows
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync app version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          chmod +x .github/scripts/sync-version.sh
          .github/scripts/sync-version.sh "$VERSION"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          chmod +x .github/scripts/install-linux-deps.sh
          .github/scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          chmod +x .github/scripts/import-apple-certificate.sh
          .github/scripts/import-apple-certificate.sh

      - name: Build Tauri bundles
        env:
          NO_STRIP: 'true'
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Stage release artifacts
        run: |
          chmod +x .github/scripts/stage-release-artifacts.sh
          .github/scripts/stage-release-artifacts.sh

      - name: Sign Windows installers
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: .github/scripts/sign-windows.ps1

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v6
        with:
          name: studio-${{ matrix.artifact }}-${{ needs.resolve-version.outputs.version }}
          path: release-artifacts/
          if-no-files-found: error

  publish:
    needs:
      - resolve-version
      - build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release tag exists
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag -a "$TAG" -m "Release $TAG"
          fi
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on remote"
          else
            git push origin "$TAG"
          fi

      - name: Download all bundles
        uses: actions/download-artifact@v6
        with:
          pattern: studio-*-${{ needs.resolve-version.outputs.version }}
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f -maxdepth 2 -print

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: MyEFvibe Studio ${{ needs.resolve-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: ${{ needs.resolve-version.outputs.draft == 'true' }}
          prerelease: false
          make_latest: true
          files: artifacts/*
          body: |
            Desktop release for **MyEFvibe Studio** ${{ needs.resolve-version.outputs.version }}.

            ### Downloads
            | Platform | Artifacts |
            |----------|-----------|
            | **Linux** | `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.AppImage` (portable) |
            | **macOS** | `.dmg` (**Apple Silicon only** — Intel Mac not supported). Signed + notarized when Apple secrets are configured. |
            | **Windows** | `.msi` (recommended) and `.exe` (NSIS). Authenticode-signed when `WINDOWS_CERTIFICATE` is configured. |

            **macOS without notarization:** If the DMG is unsigned, Gatekeeper may report “damaged”. Clear quarantine: `xattr -cr ~/Downloads/efvibe*.dmg` then open the DMG. See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md#troubleshooting).

            ### Prerequisites
            Studio still requires the [efvibe](https://www.nuget.org/packages/efvibe) CLI and .NET SDK on the machine. See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md).
